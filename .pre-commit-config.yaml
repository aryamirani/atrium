# Pre-commit hooks for Atrium. Install with `just hooks`.
# Fast checks run on every commit; slower Go checks (golangci-lint, go mod tidy)
# run on push so commits stay snappy. Update pins with `pre-commit autoupdate`.
exclude: '^web/'

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      # Golden test fixtures must stay byte-exact, so keep whitespace hooks off
      # of testdata.
      - id: end-of-file-fixer
        exclude: '(^|/)testdata/'
      - id: trailing-whitespace
        exclude: '(^|/)testdata/'
      - id: check-merge-conflict
      - id: check-added-large-files
      - id: check-yaml

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks

  - repo: local
    hooks:
      - id: gofmt
        name: gofmt
        entry: gofmt -l -w
        language: system
        types: [go]
      - id: go-vet
        name: go vet
        entry: go vet ./...
        language: system
        types: [go]
        pass_filenames: false
      # Heavier checks run on push, not on every commit.
      - id: golangci-lint
        name: golangci-lint
        entry: golangci-lint run
        language: system
        types: [go]
        pass_filenames: false
        stages: [pre-push]
      - id: go-mod-tidy
        name: go mod tidy (no drift)
        entry: bash -c 'go mod tidy && git diff --exit-code go.mod go.sum'
        language: system
        pass_filenames: false
        stages: [pre-push]
