name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    permissions: write-all
    name: Build Release
    runs-on: ubuntu-latest

    steps:
      - name: Check out code into the Go module directory
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      # syft generates the per-archive SBOMs configured in .goreleaser.yaml.
      - name: Install syft
        uses: anchore/sbom-action/download-syft@v0

      # Per-tag release notes override: if .github/release-notes/<tag>.md exists,
      # use it as the release body (bypasses the auto-generated changelog).
      # Without it, GoReleaser's grouped changelog runs as normal.
      - name: Determine GoReleaser args
        id: gr
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          NOTES=".github/release-notes/${TAG}.md"
          if [ -f "$NOTES" ]; then
            echo "Using manual release notes from $NOTES"
            echo "args=release --clean --release-notes ${NOTES}" >> "$GITHUB_OUTPUT"
          else
            echo "No per-tag notes file; auto-changelog will be used."
            echo "args=release --clean" >> "$GITHUB_OUTPUT"
          fi

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          version: latest
          args: ${{ steps.gr.outputs.args }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
