name: Lint

on:
  # No paths filter on purpose: golangci-lint and gofmt are required by branch
  # protection, so they must report on every PR. A path-filtered required check
  # never reports on a docs/web-only PR and blocks the merge (see build.yml).
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

concurrency:
  group: lint-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  # gofmt is deterministic and trivially fixable (`just fmt`), so it is a hard gate.
  format:
    name: gofmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff  # v5
        with:
          go-version-file: go.mod
          cache: false
      - name: Check formatting
        run: |
          unformatted="$(gofmt -l . | grep -v '^web/' || true)"
          if [ -n "$unformatted" ]; then
            echo "These files are not gofmt-clean (run \`just fmt\`):"
            echo "$unformatted"
            # Word-splitting is intentional: pass each file as a separate arg.
            # shellcheck disable=SC2086
            gofmt -d $unformatted
            exit 1
          fi

  # golangci-lint is a hard gate over the whole repository. The curated linter set
  # lives in .golangci.yml. gosec/revive are tracked separately for a triage pass.
  lint:
    name: golangci-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff  # v5
        with:
          go-version-file: go.mod
          cache: false
      - name: golangci-lint
        uses: golangci/golangci-lint-action@9fae48acfc02a90574d7c304a1758ef9895495fa  # v7
        with:
          version: latest
