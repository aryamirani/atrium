version: 2

project_name: atrium

builds:
  - binary: atrium
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w -X main.version={{ .Version }}
    # Reproducible builds: stamp artifacts with the commit time, not build time.
    mod_timestamp: '{{ .CommitTimestamp }}'

archives:
  - formats: [tar.gz]
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    format_overrides:
      - goos: windows
        formats: [zip]

# Software bill of materials per archive (requires syft on the release runner).
sboms:
  - artifacts: archive

# Keyless (Sigstore) signing of the checksums file via cosign. Runs in CI with
# the workflow's OIDC token (id-token: write) — no private key is managed. The
# whole release is covered transitively because every artifact's digest is in
# checksums.txt. Produces checksums.txt.sig (signature) and checksums.txt.pem
# (the ephemeral signing certificate); both are attached to the release.
# Verify: cosign verify-blob --certificate checksums.txt.pem \
#   --signature checksums.txt.sig \
#   --certificate-identity-regexp 'https://github.com/ZviBaratz/atrium/.*' \
#   --certificate-oidc-issuer https://token.actions.githubusercontent.com \
#   checksums.txt
signs:
  - cmd: cosign
    certificate: '${artifact}.pem'
    args:
      - sign-blob
      - '--output-certificate=${certificate}'
      - '--output-signature=${signature}'
      - '${artifact}'
      - '--yes'
    artifacts: checksum
    output: true

release:
  prerelease: auto
  draft: true
  replace_existing_draft: true

checksum:
  name_template: 'checksums.txt'

changelog:
  use: github
  groups:
    - title: Features
      regexp: '^.*?feat(\(.+\))??!?:.*$'
      order: 0
    - title: Fixes
      regexp: '^.*?fix(\(.+\))??!?:.*$'
      order: 1
    - title: Others
      order: 999
  filters:
    exclude:
      - "^docs:"
      - typo
      - "^refactor"
      - "^chore"
