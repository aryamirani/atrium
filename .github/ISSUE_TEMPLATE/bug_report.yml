name: Bug report
description: Report a problem with Atrium
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a report. Please search existing
        issues first to avoid duplicates.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the problem, including what you expected.
      placeholder: When I ran ... I expected ... but instead ...
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: Minimal steps to trigger the behavior.
      placeholder: |
        1. Run `atrium ...`
        2. Press ...
        3. See ...
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Atrium version
      description: Output of `atrium version`.
      placeholder: "0.1.0"
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - Linux
        - macOS
        - Windows
        - Other
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or output
      description: Paste any error output. It will be automatically formatted as code.
      render: shell
    validations:
      required: false
