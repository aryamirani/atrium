name: Lint

on:
  push:
    branches: [ main ]
    paths:
      - '**.go'
      - 'go.mod'
      - 'go.sum'
      - '.golangci.yml'
      - '.github/workflows/lint.yml'
  pull_request:
    branches: [ main ]
    paths:
      - '**.go'
      - 'go.mod'
      - 'go.sum'
      - '.golangci.yml'
      - '.github/workflows/lint.yml'

jobs:
  # gofmt is deterministic and trivially fixable (`just fmt`), so it is a hard gate.
  format:
    name: gofmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: false
      - name: Check formatting
        run: |
          unformatted="$(gofmt -l . | grep -v '^web/' || true)"
          if [ -n "$unformatted" ]; then
            echo "These files are not gofmt-clean (run \`just fmt\`):"
            echo "$unformatted"
            gofmt -d $unformatted
            exit 1
          fi

  # golangci-lint runs in report mode: it annotates findings but does not block
  # merges (report-don't-block), so autonomous/agent-driven changes aren't gated
  # on style. Tighten to a hard gate later if desired.
  lint:
    name: golangci-lint
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: false
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: latest
          only-new-issues: true
