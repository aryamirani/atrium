name: Smoke (e2e)

# End-to-end TUI smoke test (issue #148/#274): drives the real atrium binary
# through vhs to prove the live create→attach→detach layer renders
# deterministically and still matches the committed golden.
#
# This is a ROT ALARM, never a gate. It is not in the required `Build` workflow
# because it is slow (~20s), depends on non-Go binaries (vhs, ttyd, ffmpeg,
# tmux, jq) and drives a real tmux server through a PTY. It runs on a weekly
# schedule and on demand; `continue-on-error: true` means a red run surfaces rot
# without ever blocking a PR.
#
# Note: charmbracelet/vhs-action (the "obvious" choice) can't be used — its
# linux ffmpeg installer hard-matches BtbN/FFmpeg-Builds `ffmpeg-n5.1` assets,
# which that project's rolling "latest" release no longer ships (n7.1/n8.1 now),
# so the action fails with "Failed to install ffmpeg". We install the deps
# directly instead: ffmpeg/ttyd/tmux/jq from apt, vhs pinned via `go install`.
on:
  schedule:
    # Weekly, Monday 07:00 UTC.
    - cron: '0 7 * * 1'
  workflow_dispatch:

# Least privilege: this workflow only reads the repo.
permissions:
  contents: read

jobs:
  smoke:
    name: Smoke (ubuntu)
    runs-on: ubuntu-latest
    # Never gate a PR: a smoke failure is a rot signal, not a merge blocker.
    continue-on-error: true
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff  # v5
        with:
          go-version-file: go.mod
          cache: true

      # run.sh's non-Go deps. ffmpeg is only a PATH requirement (the tape outputs
      # .txt, not video), ttyd is vhs's headless terminal, tmux+jq drive/seed the
      # flow. All four are in ubuntu's apt.
      - name: Install smoke dependencies
        run: sudo apt-get update && sudo apt-get install -y tmux jq ffmpeg ttyd

      # vhs pinned to the version the committed golden was captured with; setup-go
      # already provides the toolchain. Put GOPATH/bin on PATH for run.sh.
      - name: Install vhs
        run: |
          go install github.com/charmbracelet/vhs@v0.11.0
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Run smoke flow
        run: RUNS=1 bash test/smoke/run.sh
