# golangci-lint v2 configuration. See https://golangci-lint.run/usage/configuration/
version: "2"

run:
  timeout: 5m

linters:
  # The "standard" set: errcheck, govet, ineffassign, staticcheck, unused.
  default: standard
  # Curated additions on top of the standard set.
  enable:
    - bodyclose   # unclosed HTTP response bodies
    - errorlint   # %w wrapping / errors.As correctness
    - gosec       # security issues (structural false positives excluded below)
    - misspell    # common spelling mistakes
    - noctx       # exec/http calls that bypass context cancellation
    - nolintlint  # malformed or unexplained //nolint directives
    - revive      # curated correctness/clarity rules (see settings below)
    - unconvert   # unnecessary type conversions
  settings:
    gosec:
      # Atrium is a process/worktree orchestrator: it intentionally launches
      # tmux/git/agent subprocesses with dynamic arguments (G204/G702), reads
      # files at user- and worktree-derived paths (G304), and writes
      # config/state with conventional permissions (G301/G302/G306) — none of
      # which hold secrets. These rule classes are structural to what the tool
      # does, so they are excluded centrally here rather than annotated at
      # dozens of intentional call sites. (G702 fires on the SHELL-detection
      # helper, where the command string is a hardcoded literal — no tainted
      # input reaches it.) Integer-overflow (G115) and weak-RNG (G404) are NOT
      # excluded: real G115 sites are fixed in code, and G404 only fired in
      # tests (excluded via the _test.go rule below).
      excludes:
        - G204
        - G301
        - G302
        - G304
        - G306
        - G702
    revive:
      # Listing rules replaces revive's default set, so this is the full enabled
      # set. It is curated for correctness/clarity plus the documentation rules
      # (exported, package-comments; the #24 doc-comment sweep) and deliberately
      # omits unused-parameter.
      rules:
        - name: blank-imports
        - name: context-as-argument
        - name: context-keys-type
        - name: dot-imports
        - name: error-naming
        - name: error-return
        - name: error-strings
        - name: errorf
        - name: exported
        - name: increment-decrement
        - name: indent-error-flow
        - name: package-comments
        - name: range
        - name: receiver-naming
        - name: redefines-builtin-id
        - name: superfluous-else
        - name: time-naming
        - name: unreachable-code
        - name: var-declaration
        - name: var-naming
  exclusions:
    generated: lax
    paths:
      - web
    rules:
      # QF1003 ("could use tagged switch") is an opinionated quickfix, not a
      # correctness issue; converting the Bubble Tea state if-chains to switches
      # is a larger refactor tracked separately. Suppress just this check.
      - linters:
          - staticcheck
        text: 'QF1003'
      # Tests use math/rand for fixtures (gosec G404) and other patterns that
      # are irrelevant to the shipped binary's threat surface.
      - linters:
          - gosec
        path: '_test\.go'

formatters:
  enable:
    - gofmt
  exclusions:
    paths:
      - web
