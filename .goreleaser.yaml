version: 2

project_name: atrium

builds:
  - binary: atrium
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w -X main.version={{ .Version }}
    # Reproducible builds: stamp artifacts with the commit time, not build time.
    mod_timestamp: '{{ .CommitTimestamp }}'

archives:
  - formats: [tar.gz]
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    format_overrides:
      - goos: windows
        formats: [zip]

# Software bill of materials per archive (requires syft on the release runner).
sboms:
  - artifacts: archive

release:
  prerelease: auto
  draft: true
  replace_existing_draft: true

checksum:
  name_template: 'checksums.txt'

changelog:
  use: github
  groups:
    - title: Features
      regexp: '^.*?feat(\(.+\))??!?:.*$'
      order: 0
    - title: Fixes
      regexp: '^.*?fix(\(.+\))??!?:.*$'
      order: 1
    - title: Others
      order: 999
  filters:
    exclude:
      - "^docs:"
      - typo
      - "^refactor"
      - "^chore"

